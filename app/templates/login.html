<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 学员管理系统</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/fontawesome.min.css') }}" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e1e2d 0%, #2d2d3f 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 400px; margin: 0 auto; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: none; }
        .login-header { background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; padding: 40px 30px; text-align: center; border-radius: 16px 16px 0 0; }
        .login-header i { font-size: 48px; margin-bottom: 16px; }
        .login-header h4 { font-weight: 600; margin: 0; }
        .login-body { padding: 30px; background: #fff; border-radius: 0 0 16px 16px; }
        .form-label { font-weight: 500; color: #374151; }
        .form-control { border: 1px solid #e4e6ef; border-radius: 8px; padding: 12px 16px; }
        .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn-login { background: linear-gradient(135deg, #4f46e5, #6366f1); border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 500; }
        .btn-login:hover { background: linear-gradient(135deg, #4338ca, #4f46e5); }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="login-header">
            <i class="fas fa-graduation-cap"></i>
            <h4>学员管理系统</h4>
        </div>
        <div class="login-body">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" placeholder="请输入用户名">
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" id="password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary btn-login w-100" onclick="doLogin()">登录</button>
            <p class="text-muted text-center mt-3 mb-0"><small>默认账号: admin / admin123</small></p>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
<script>
function doLogin(){
    var btn = $('.btn-login');
    btn.prop('disabled',true).html('<i class="fas fa-spinner fa-spin me-2"></i>登录中...');
    $.ajax({
        url: '/api/login', method: 'POST', contentType: 'application/json',
        data: JSON.stringify({username: $('#username').val(), password: $('#password').val()}),
        success: function(res){
            if(res.code === 0){ window.location.href = '/'; }
            else { alert(res.msg); btn.prop('disabled',false).html('登录'); }
        },
        error: function(xhr){
            alert(xhr.responseJSON ? xhr.responseJSON.msg : '登录失败');
            btn.prop('disabled',false).html('登录');
        }
    });
}
$('#password').keypress(function(e){ if(e.which===13) doLogin(); });
</script>
</body>
</html>
