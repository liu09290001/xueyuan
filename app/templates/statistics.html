{% extends "base.html" %}
{% block title %}数据统计 - 学员管理系统{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h4><i class="fas fa-chart-pie"></i>数据统计</h4>
        <p class="page-subtitle">图表区域同步应用少女风主题色板，让状态、报名与出勤分布在视觉上更统一。</p>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <span class="chart-icon chart-icon-rose"><i class="fas fa-users"></i></span>学员状态分布
            </div>
            <div class="card-body chart-stage d-flex align-items-center justify-content-center">
                <canvas id="statusChart" class="chart-canvas"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <span class="chart-icon chart-icon-mint"><i class="fas fa-book-open"></i></span>课程报名统计
            </div>
            <div class="card-body chart-stage d-flex align-items-center justify-content-center">
                <canvas id="courseChart" class="chart-canvas"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- 出勤率统计 -->
<div class="row">
    <div class="col-md-12 mb-4">
        <div class="card">
            <div class="card-header">
                <span class="chart-icon chart-icon-peach"><i class="fas fa-calendar-check"></i></span>课程出勤率统计
            </div>
            <div class="card-body">
                <canvas id="attendanceChart" class="chart-canvas"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>
<script>
function themeVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

var palette = {
    rose: themeVar('--rose-500'),
    roseSoft: themeVar('--rose-300'),
    lavender: themeVar('--lavender-500'),
    mint: themeVar('--mint-500'),
    peach: themeVar('--peach-500'),
    coral: themeVar('--coral-500'),
    sky: themeVar('--sky-500'),
    text: themeVar('--text-muted'),
    border: themeVar('--line-soft')
};

$(function(){
    Chart.defaults.color = palette.text;
    Chart.defaults.borderColor = palette.border;

    // 加载图表数据
    $.get('/api/statistics/charts', function(res){
        if(res.code === 0){
            renderStatusChart(res.data.student_status);
            renderCourseChart(res.data.course_enrollment);
            renderAttendanceChart(res.data.attendance_rate);
        }
    });
});

function renderStatusChart(data){
    var labels = Object.keys(data);
    var values = Object.values(data);
    if(labels.length === 0){ $('#statusChart').parent().html('<p class="text-muted">暂无数据</p>'); return; }

    new Chart($('#statusChart'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [palette.rose, palette.peach, palette.mint, palette.coral, palette.lavender],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            cutout: '64%'
        }
    });
}

function renderCourseChart(data){
    var labels = Object.keys(data);
    var values = Object.values(data);
    if(labels.length === 0){ $('#courseChart').parent().html('<p class="text-muted">暂无数据</p>'); return; }

    new Chart($('#courseChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '报名人数',
                data: values,
                backgroundColor: [palette.rose, palette.lavender, palette.peach, palette.mint, palette.sky],
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false } },
                y: { beginAtZero: true, ticks: { stepSize: 1 } }
            }
        }
    });
}

function renderAttendanceChart(data){
    if(!data || Object.keys(data).length === 0){
        $('#attendanceChart').parent().html('<p class="text-muted text-center py-4">暂无出勤数据</p>');
        return;
    }
    var labels = Object.keys(data);
    var values = Object.values(data);

    new Chart($('#attendanceChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '出勤率 (%)',
                data: values,
                backgroundColor: values.map(function(v){
                    if(v >= 80) return palette.mint;
                    if(v >= 60) return palette.peach;
                    return palette.coral;
                }),
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, max: 100, ticks: { callback: function(v){ return v + '%'; } } } }
        }
    });
}
</script>
{% endblock %}
