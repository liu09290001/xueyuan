{% extends "base.html" %}
{% block title %}仪表盘 - 学员管理系统{% endblock %}
{% block content %}
<div class="welcome-banner">
    <div class="welcome-tag"><i class="fas fa-heart"></i>少女风主题仪表盘</div>
    <h2>欢迎回来，管理员</h2>
    <p>今天也是轻盈高效的一天，来看看学员、课程和报名数据的最新状态吧。</p>
    <div class="date" id="currentDate"></div>
    <div class="welcome-ornament">Sweet Campus</div>
</div>

<div class="row g-3 mb-3">
    <div class="col-md-3">
        <div class="card stat-card stat-card-rose h-100">
            <div class="d-flex align-items-center">
                <div class="stat-icon me-3">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <p class="stat-label">学员总数</p>
                    <h3 class="stat-value" id="studentCount">-</h3>
                </div>
            </div>
            <div class="stat-trend">
                <i class="fas fa-heart trend-icon me-1"></i>在读学员为主
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card stat-card-mint h-100">
            <div class="d-flex align-items-center">
                <div class="stat-icon me-3">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <p class="stat-label">课程数量</p>
                    <h3 class="stat-value" id="courseCount">-</h3>
                </div>
            </div>
            <div class="stat-trend">
                <i class="fas fa-check-circle trend-icon me-1"></i>课程持续开设中
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card stat-card-peach h-100">
            <div class="d-flex align-items-center">
                <div class="stat-icon me-3">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div>
                    <p class="stat-label">报名人次</p>
                    <h3 class="stat-value" id="enrollmentCount">-</h3>
                </div>
            </div>
            <div class="stat-trend">
                <i class="fas fa-chart-line trend-icon me-1"></i>报名热度保持上升
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card stat-card-coral h-100">
            <div class="d-flex align-items-center">
                <div class="stat-icon me-3">
                    <i class="fas fa-yen-sign"></i>
                </div>
                <div>
                    <p class="stat-label">本月收入</p>
                    <h3 class="stat-value">¥<span id="monthIncome">-</span></h3>
                </div>
            </div>
            <div class="stat-trend">
                <i class="fas fa-calendar-alt trend-icon me-1"></i>本月累计收入概览
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
var now = new Date();
var weekDays = ['日', '一', '二', '三', '四', '五', '六'];
$('#currentDate').text(now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 星期' + weekDays[now.getDay()]);

$(function(){
    $.get('/api/statistics/dashboard', function(res){
        if(res.code === 0){
            $('#studentCount').text(res.data.student_count);
            $('#courseCount').text(res.data.course_count);
            $('#enrollmentCount').text(res.data.enrollment_count);
            $('#monthIncome').text(res.data.month_income.toLocaleString());
        }
    });
});
</script>
{% endblock %}
