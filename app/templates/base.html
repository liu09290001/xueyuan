<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}学员管理系统{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/fontawesome.min.css') }}" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --sidebar-bg: #1e1e2d;
            --sidebar-hover: #2d2d3f;
            --text-muted: #a1a5b7;
            --border-color: #e4e6ef;
            --card-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; background: #f5f8fa; min-height: 100vh; }

        /* 侧边栏 */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
            background: var(--sidebar-bg); z-index: 100; transition: all 0.3s;
        }
        .sidebar .logo {
            padding: 24px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .sidebar .logo-icon {
            width: 40px; height: 40px; background: var(--primary);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        .sidebar .logo-icon i { color: #fff; font-size: 18px; }
        .sidebar .logo-text { color: #fff; font-size: 16px; font-weight: 600; }

        .sidebar nav { padding: 16px 12px; }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            color: var(--text-muted); text-decoration: none; border-radius: 8px;
            margin-bottom: 4px; transition: all 0.2s; font-size: 14px;
        }
        .sidebar .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
        .sidebar .nav-item.active { background: var(--primary); color: #fff; }
        .sidebar .nav-item i { width: 20px; text-align: center; font-size: 16px; }
        .sidebar .nav-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 16px 0; }
        .sidebar .nav-item.logout { color: #f87171; }
        .sidebar .nav-item.logout:hover { background: rgba(248,113,113,0.15); }

        /* 主内容区 */
        .main-content { margin-left: 260px; padding: 24px 32px; min-height: 100vh; }

        /* 页面头部 */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color);
        }
        .page-header h4 { font-size: 20px; font-weight: 600; color: #1e1e2d; margin: 0; }
        .page-header h4 i { color: var(--primary); margin-right: 10px; }

        /* 卡片 */
        .card {
            background: #fff; border: none; border-radius: 12px;
            box-shadow: var(--card-shadow); overflow: hidden;
        }
        .card-header {
            background: #fff; border-bottom: 1px solid var(--border-color);
            padding: 16px 20px; font-weight: 600; font-size: 14px;
        }
        .card-body { padding: 20px; }

        /* 按钮 */
        .btn-primary {
            background: var(--primary); border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 500; font-size: 14px;
        }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-outline-primary { border-color: var(--primary); color: var(--primary); }
        .btn-outline-primary:hover { background: var(--primary); border-color: var(--primary); }

        /* 表格 */
        .table { margin: 0; }
        .table thead th {
            background: #f9fafb; color: #6b7280; font-weight: 600;
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 14px 16px; border-bottom: 1px solid var(--border-color);
        }
        .table tbody td { padding: 14px 16px; vertical-align: middle; color: #374151; font-size: 14px; }
        .table tbody tr:hover { background: #f9fafb; }

        /* 徽章 */
        .badge { padding: 6px 12px; border-radius: 6px; font-weight: 500; font-size: 12px; }
        .badge.bg-success { background: #d1fae5 !important; color: #065f46; }
        .badge.bg-warning { background: #fef3c7 !important; color: #92400e; }
        .badge.bg-info { background: #dbeafe !important; color: #1e40af; }
        .badge.bg-secondary { background: #f3f4f6 !important; color: #4b5563; }
        .badge.bg-danger { background: #fee2e2 !important; color: #991b1b; }

        /* 表单 */
        .form-control, .form-select {
            border: 1px solid var(--border-color); border-radius: 8px;
            padding: 10px 14px; font-size: 14px;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .input-group-text { background: #f9fafb; border-color: var(--border-color); }

        /* 模态框 */
        .modal-content { border: none; border-radius: 12px; }
        .modal-header { background: #f9fafb; border-radius: 12px 12px 0 0; padding: 16px 20px; }
        .modal-body { padding: 20px; }
        .modal-footer { border-top: 1px solid var(--border-color); padding: 16px 20px; }

        /* 分页 */
        .pagination { margin: 0; }
        .page-link { border: none; color: #6b7280; padding: 8px 14px; margin: 0 2px; border-radius: 6px; }
        .page-link:hover { background: #f3f4f6; color: var(--primary); }
        .page-item.active .page-link { background: var(--primary); color: #fff; }

        /* 统计卡片 */
        .stat-card { border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .stat-card .stat-icon {
            width: 48px; height: 48px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .stat-card h3 { font-size: 28px; font-weight: 700; margin: 0; }
        .stat-card p { font-size: 13px; color: #6b7280; margin: 0; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<!-- 侧边栏 -->
<div class="sidebar">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <span class="logo-text">学员管理系统</span>
    </div>
    <nav>
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <i class="fas fa-th-large"></i><span>仪表盘</span>
        </a>
        <a href="/students" class="nav-item {% if request.path == '/students' %}active{% endif %}">
            <i class="fas fa-users"></i><span>学员管理</span>
        </a>
        <a href="/courses" class="nav-item {% if request.path == '/courses' %}active{% endif %}">
            <i class="fas fa-book-open"></i><span>课程管理</span>
        </a>
        <a href="/enrollments" class="nav-item {% if request.path == '/enrollments' %}active{% endif %}">
            <i class="fas fa-file-invoice-dollar"></i><span>报名缴费</span>
        </a>
        <a href="/attendance" class="nav-item {% if request.path == '/attendance' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i><span>考勤管理</span>
        </a>
        <a href="/statistics" class="nav-item {% if request.path == '/statistics' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i><span>数据统计</span>
        </a>
        <div class="nav-divider"></div>
        <a href="javascript:void(0)" onclick="doLogout()" class="nav-item logout">
            <i class="fas fa-sign-out-alt"></i><span>退出登录</span>
        </a>
    </nav>
</div>

<!-- 主内容 -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script>
// 全局AJAX配置：超时5秒
$.ajaxSetup({timeout: 5000});

function doLogout(){
    if(confirm('确定退出登录?')){
        $.post('/api/logout', function(){ window.location.href='/login'; });
    }
}
$(document).ajaxError(function(e,xhr){
    if(xhr.status===401){ window.location.href='/login'; }
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
